global
    log /dev/log local0
    maxconn 2000
    user haproxy
    group haproxy

defaults
    log     global
    mode    http 
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend mi_frontend
    bind *:80
    mode http
    default_backend mis_nodos_node

backend mis_nodos_node
    mode http
    balance roundrobin
    option forwardfor 
    server nodo1 127.0.0.1:3000 check
    server nodo2 127.0.0.1:3001 check
